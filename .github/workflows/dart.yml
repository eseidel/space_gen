name: Dart

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  cspell:
    name: 🔤 Check Spelling
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      config: cspell.config.yaml

  # Analyze the generator itself and run its unit tests with coverage.
  #
  # This and the `synthetic` / `third-party` jobs below were one serial
  # `build` job. They were split because the coverage run and the fixture
  # regen are independent, so running them on separate runners overlaps
  # them instead of summing them.
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze project source
        run: dart analyze
      - name: Run tests with coverage
        run: ./coverage.sh
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

  # The synthetic fixtures (gen_tests/*, everything except third_party).
  # `--verify` compiles and tests these — they are small and exist to
  # exercise runtime behavior (toJson/fromJson round-tripping, hashCode,
  # etc.) that the generator's own unit tests can't see (#307). The
  # `git diff` gate catches an output-changing PR that landed without a
  # regen (#280).
  #
  # `-i` skips the third_party specs so this job regenerates only the
  # synthetic ones; each third_party spec has its own matrix leg below.
  # Keep this list in sync with the `third-party` matrix — a spec named
  # in neither place would be regenerated by no job and could drift
  # silently. (A new *synthetic* fixture needs no change here; it is
  # picked up automatically.)
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Regenerate synthetic fixtures, verify, and run generator tests
        run: >
          dart run tool/gen_tests.dart --verify
          -i github,discord,backstage,petstore,spacetraders,train_travel
      - name: Verify synthetic goldens match the generator
        run: git diff --exit-code -- gen_tests/ ':(exclude)gen_tests/third_party'

  # One job per third_party spec: regenerate it, confirm the committed
  # golden still matches the generator, and confirm the generated package
  # analyzes clean. This is the coverage Shorebird's Workflow Discovery
  # used to provide before it was retired.
  #
  # `dart analyze` rather than `dart test`: the synthetic fixtures above
  # already cover runtime round-tripping generator-wide, so third_party's
  # value here is breadth of real-world schema shapes reaching the
  # analyzer. It is also the only feasible check — github's ~1700 test
  # kernels build ~68 GB of scratch, well past a standard runner's disk,
  # whereas static analysis of the same tree is ~10s.
  #
  # `glob` is matched against each spec's path (a `contains` check);
  # `dir` is the generated package the golden lives in. Adding a spec is
  # one matrix entry here plus the `-i` list in `synthetic` above.
  third-party:
    runs-on: ubuntu-latest
    name: third-party (${{ matrix.glob }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - glob: github
            dir: gen_tests/third_party/github
          - glob: discord
            dir: gen_tests/third_party/discord
          - glob: backstage
            dir: gen_tests/third_party/backstage
          - glob: petstore
            dir: gen_tests/third_party/petstore
          - glob: spacetraders
            dir: gen_tests/third_party/spacetraders
          - glob: train-travel
            dir: gen_tests/third_party/train_travel
    steps:
      - uses: actions/checkout@v3
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Regenerate ${{ matrix.glob }}
        run: dart run tool/gen_tests.dart ${{ matrix.glob }}
      - name: Verify golden matches the generator
        run: git diff --exit-code -- ${{ matrix.dir }}
      - name: Analyze generated package
        working-directory: ${{ matrix.dir }}
        run: |
          dart pub get
          dart analyze

  # Aggregate gate so branch protection can require a single stable check
  # instead of one context per matrix leg — adding a third_party spec
  # then needs no branch-protection change. Fails if any leg failed or
  # was skipped.
  third-party-gate:
    runs-on: ubuntu-latest
    needs: third-party
    if: always()
    steps:
      - name: Check third-party matrix result
        run: |
          if [ "${{ needs.third-party.result }}" != "success" ]; then
            echo "A third-party leg did not succeed: ${{ needs.third-party.result }}"
            exit 1
          fi
