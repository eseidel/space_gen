# Manifest for `tool/gen_tests.dart` — the list of fixtures this
# directory generates, and how.
#
#     dart run tool/gen_tests.dart            # all of them
#     dart run tool/gen_tests.dart types      # just one
#     dart run tool/gen_tests.dart --dry-run  # show the mapping only
#
# These are the synthetic specs, written for this repo, each aimed at one
# feature. The real-world regression corpus lives in `third_party/`,
# which has its own manifest — see the README there.
#
# These fixtures are generated WITH `Quirks.openapi()`, unlike
# `third_party/`, which sets `openapi: false`. The quirks flip six flags
# (dynamicJson, mutableModels, nonNullableDefaultValues,
# allListsDefaultToEmpty, screamingCapsEnums, flatModelDir), so the
# setting decides both the `lib/model/` layout and the emitted
# nullability and mutability.
openapi: true

# `--verify` compiles and tests these (dart pub get + analyze + test).
# They are generated and diff-gated but were otherwise never compiled,
# so a generator change emitting code that does not analyze would land
# green (#307). This is the default; spelled out because it is the
# coverage these fixtures exist to provide. `third_party/` opts out.
verify: true

# `package:` defaults to the spec's filename with the extension dropped
# and `.`/`-` folded to `_`, which is what every fixture here wants.
specs:
  - spec: multipart.json
  - spec: security.json
  - spec: types.json
  - spec: unsupported_auth.json
