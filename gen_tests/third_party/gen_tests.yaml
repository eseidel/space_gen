# Manifest for `tool/gen_tests.dart` — the real-world regression corpus.
#
# Run from the package root, same as the synthetic fixtures one level up:
#
#     dart run tool/gen_tests.dart            # all of them
#     dart run tool/gen_tests.dart github     # just one
#
# These specs are third-party (see README.md for provenance and
# copyright). Keeping them in their own directory is what lets the
# licensing note and the cspell `ignorePaths` entry each name a single
# path rather than enumerating every spec.
#
# Generated WITHOUT `Quirks.openapi()` — plain
# `dart run space_gen -i <spec> -o <dir>`, which is how they were
# originally produced, and which keeps the non-quirks path covered. The
# quirks flip six flags (dynamicJson, mutableModels,
# nonNullableDefaultValues, allListsDefaultToEmpty, screamingCapsEnums,
# flatModelDir), so generating these with them would rewrite every
# package into `lib/model/` with different nullability and mutability.
openapi: false

# `--verify` skips these — it runs `dart test`, and github alone builds
# ~1700 test kernels (~68 GB of scratch, ~104s), well past a standard CI
# runner's disk. CI instead runs `dart analyze` on each generated
# package in its own `third-party` matrix leg (see .github/workflows/
# dart.yml): static analysis of the same tree is ~10s and catches
# emitted code that does not compile (#307), which is the coverage that
# matters here. Runtime round-tripping is already covered generator-wide
# by the synthetic fixtures one level up, which keep the default `true`.
# (Until it was retired, Shorebird's Workflow Discovery compiled and
# tested these, which is why this stayed `false` historically.)
verify: false

# `package:` defaults to the spec's filename with the extension dropped
# and `.`/`-` folded to `_`, so it is only spelled out below where that
# default is not what we want.
specs:
  - spec: api.github.com.json
    package: github # default would be api_github_com
  - spec: backstage.yaml
  - spec: discord.json
  - spec: petstore.json
  - spec: spacetraders.json
  - spec: train-travel.yaml
    package: train_travel # default already folds `-`; explicit for clarity
